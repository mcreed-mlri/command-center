<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Training Unit — Command Center</title>
  <meta name="description" content="One place for every tool the MLRI Training Unit uses." />
  <meta name="theme-color" content="#f7f3ec" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <style>
    /* ---- tokens ---------------------------------------------------- */
    :root {
      --paper:      #f7f3ec;
      --paper-2:    #f1ebdf;
      --card:       #ffffff;
      --line:       #e7e0d3;
      --ink:        #1c1a17;
      --muted:      #6b6459;
      --faint:      #8a8272;
      --terracotta: #b4531f;
      --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
      --sans:  ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow: 0 1px 2px rgba(28,26,23,.05), 0 4px 16px -4px rgba(28,26,23,.12);
      --shadow-lg: 0 2px 4px rgba(28,26,23,.06), 0 12px 32px -8px rgba(28,26,23,.16);
    }

    /* Dark tokens, defined once. Applied when the OS is dark (unless the user
       forced light), or whenever the user explicitly picks dark via the toggle. */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --paper: #17150f; --paper-2:#1e1b14; --card:#211d16; --line:#332d22;
        --ink:#f3ede0; --muted:#b3a992; --faint:#8f866f; --terracotta:#e0824a;
        --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px -14px rgba(0,0,0,.6);
      }
    }
    :root[data-theme="dark"] {
      --paper: #17150f; --paper-2:#1e1b14; --card:#211d16; --line:#332d22;
      --ink:#f3ede0; --muted:#b3a992; --faint:#8f866f; --terracotta:#e0824a;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 10px 30px -14px rgba(0,0,0,.6);
    }

    /* top-right actions (search + theme) */
    .head-right {
      display: flex; align-items: center; gap: 12px;
    }
    .top-actions {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .icon-btn {
      width: 42px; height: 42px; display: grid; place-items: center;
      background: var(--card); border: 1px solid var(--line); border-radius: 999px;
      color: var(--ink); cursor: pointer; box-shadow: var(--shadow);
      transition: transform .14s ease, border-color .14s ease;
    }
    .icon-btn:hover { transform: translateY(-1px); border-color: color-mix(in srgb, var(--terracotta) 45%, var(--line)); }
    .icon-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px color-mix(in srgb, var(--terracotta) 35%, transparent), var(--shadow); }
    .icon-btn svg { width: 20px; height: 20px; }
    .icon-btn[aria-expanded="true"],
    .icon-btn.is-active {
      border-color: var(--terracotta);
      color: var(--terracotta);
    }

    .search-wrap { position: relative; z-index: 5; }
    .search-panel {
      position: absolute; top: calc(100% + 8px); right: 0;
      width: min(320px, calc(100vw - 32px));
      opacity: 0; visibility: hidden; pointer-events: none;
      transform: translateY(-6px);
      transition: opacity .16s ease, transform .16s ease, visibility .16s;
    }
    .search-panel.is-open {
      opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0);
    }
    .search-panel input {
      width: 100%; font: inherit; font-size: 15px; color: var(--ink);
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 11px 14px;
      box-shadow: var(--shadow); transition: border-color .15s;
    }
    .search-panel input::placeholder { color: var(--faint); }
    .search-panel input:focus { outline: none; border-color: var(--terracotta); }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, color-mix(in srgb, var(--terracotta) 6%, transparent), transparent),
        var(--paper);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding: max(20px, env(safe-area-inset-top)) 24px calc(40px + env(safe-area-inset-bottom));
    }
    .wrap { max-width: 1160px; margin: 0 auto; }

    /* ---- header ---------------------------------------------------- */
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 16px 32px;
      padding: 8px 0 28px;
      margin-bottom: 8px;
    }
    .head-main { min-width: 0; }
    .eyebrow {
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--terracotta); font-weight: 650; margin: 0 0 8px;
    }
    h1 {
      font-family: var(--serif); font-weight: 700;
      font-size: clamp(28px, 5vw, 40px); line-height: 1.05;
      letter-spacing: -.02em; margin: 0;
    }
    .head-meta {
      text-align: right;
      padding: 10px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .greeting { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.2; }
    .today { font-size: 12px; color: var(--muted); margin-top: 2px; }
    @media (max-width: 640px) {
      header { grid-template-columns: 1fr; }
      .head-right { flex-wrap: wrap; justify-content: space-between; width: 100%; }
      .head-meta { text-align: left; flex: 1; }
    }

    /* ---- dashboard grid -------------------------------------------- */
    #board { margin-top: 0; }

    @media (min-width: 960px) {
      #board {
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) minmax(300px, 1fr);
        gap: 16px;
        align-items: start;
      }
      .dash-col {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 0;
      }

      #board.is-searching {
        display: block;
      }
      #board.is-searching .dash-col {
        display: block;
      }
      #board.is-searching .dash-col + .dash-col {
        margin-top: 0;
      }
      #board.is-searching .dash-panel + .dash-panel {
        margin-top: 16px;
      }
      #board.is-searching .dash-col:first-child .dash-panel:first-child {
        margin-top: 0;
      }
    }

    @media (max-width: 959px) {
      #board {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .dash-col {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
    }

    .dash-panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px 18px 16px;
    }
    .dash-panel--work { padding: 20px; }

    .panel-head {
      margin: 0 0 14px; padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .panel-title {
      font-size: 13px; font-weight: 650; letter-spacing: .04em;
      text-transform: uppercase; color: var(--muted); margin: 0;
    }


    /* ---- layouts --------------------------------------------------- */
    .grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
    .grid--tools { gap: 12px; }

    .doc-list { display: flex; flex-direction: column; gap: 6px; }
    .doc-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 12px; border-radius: var(--radius);
      text-decoration: none; color: inherit;
      border: 1px solid transparent;
      transition: background .14s ease, border-color .14s ease;
    }
    .doc-row:hover, .doc-row:focus-visible {
      background: var(--paper-2);
      border-color: var(--line);
      outline: none;
    }
    .doc-row:focus-visible {
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--terracotta)) 30%, transparent);
    }
    .doc-row .mono { width: 36px; height: 36px; font-size: 15px; border-radius: 8px; }
    .doc-row .tile-body { flex: 1; min-width: 0; }
    .doc-row .tile-name { font-size: 14px; font-weight: 600; }
    .doc-row .tile-desc { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-row .tile-arrow { margin-left: 0; font-size: 14px; opacity: .5; }
    .doc-row:hover .tile-arrow { opacity: 1; color: var(--accent, var(--terracotta)); }

    .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    @media (max-width: 400px) { .app-grid { grid-template-columns: repeat(2, 1fr); } }
    .app-tile {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      padding: 12px 6px; border-radius: var(--radius);
      text-decoration: none; color: inherit; text-align: center;
      background: var(--paper-2); border: 1px solid var(--line);
      transition: transform .14s ease, border-color .14s ease;
    }
    .app-tile:hover, .app-tile:focus-visible {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 45%, var(--line));
      outline: none;
    }
    .app-tile .mono, .app-tile img { width: 32px; height: 32px; border-radius: 8px; }
    .app-tile img { display: block; object-fit: contain; }
    .app-tile .app-mono {
      width: 32px; height: 32px; border-radius: 8px;
      display: grid; place-items: center;
      font-family: var(--serif); font-weight: 700; font-size: 14px;
      color: var(--accent, var(--terracotta));
      background: color-mix(in srgb, var(--accent, var(--terracotta)) 14%, var(--card));
    }
    .app-label {
      font-size: 11px; font-weight: 600; line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .app-tile.is-soon { opacity: .55; cursor: default; }
    .app-tile.is-soon:hover { transform: none; border-color: var(--line); }
    .app-tile .soon-tag {
      margin: 0; font-size: 9px; padding: 1px 5px;
    }

    /* legacy quick styles (search results fallback) */
    .quick-links { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-links--block { margin-left: 0; margin-top: 2px; gap: 10px; }
    .quick {
      display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
      color: var(--ink); background: var(--paper-2); border: 1px solid var(--line);
      border-radius: 999px; padding: 6px 13px 6px 9px; font-size: 13px; font-weight: 600;
      transition: transform .14s ease, border-color .14s ease;
    }
    .quick:hover, .quick:focus-visible {
      transform: translateY(-1px); outline: none;
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 55%, var(--line));
    }
    .quick img { width: 17px; height: 17px; display: block; }
    .quick-mono {
      width: 17px; height: 17px; display: grid; place-items: center; border-radius: 5px;
      font-family: var(--serif); font-weight: 700; font-size: 12px;
      color: var(--accent, var(--terracotta));
      background: color-mix(in srgb, var(--accent, var(--terracotta)) 14%, var(--card));
    }

    /* ---- tile ------------------------------------------------------ */
    .tile {
      display: flex; align-items: center; gap: 14px; text-decoration: none;
      color: inherit; background: var(--paper-2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 14px 16px;
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }
    .tile:hover, .tile:focus-visible {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 55%, var(--line));
      outline: none;
    }
    .tile:focus-visible { box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--terracotta)) 35%, transparent), var(--shadow); }
    .mono {
      flex: none; width: 44px; height: 44px; border-radius: 10px;
      display: grid; place-items: center; font-family: var(--serif);
      font-weight: 700; font-size: 20px;
      color: var(--accent, var(--terracotta));
      background: color-mix(in srgb, var(--accent, var(--terracotta)) 12%, var(--card));
    }
    .mono--logo { background: var(--paper-2); }
    .mono--logo img { width: 26px; height: 26px; display: block; }
    .tile-body { min-width: 0; }
    .tile-name { font-weight: 650; font-size: 15.5px; letter-spacing: -.005em; }
    .tile-desc {
      color: var(--muted); font-size: 13px; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tile-arrow { margin-left: auto; color: var(--faint); flex: none; transition: transform .14s, color .14s; }
    .tile:hover .tile-arrow, .tile:focus-visible .tile-arrow { color: var(--accent, var(--terracotta)); transform: translateX(3px); }

    /* ---- accordion tile (Drive, Monday) --------------------------- */
    .tile-accordion {
      grid-column: 1 / -1;
      background: var(--paper-2); border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden; transition: border-color .14s ease;
    }
    .tile-accordion:hover,
    .tile-accordion[open] { border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 45%, var(--line)); }
    .acc-summary {
      list-style: none; cursor: pointer;
      display: flex; align-items: center; gap: 14px; padding: 15px 16px;
    }
    .acc-summary::-webkit-details-marker { display: none; }
    .acc-summary:focus-visible {
      outline: none;
      box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent, var(--terracotta)) 45%, transparent);
    }
    .acc-count {
      margin-left: auto; flex: none; font-size: 12px; color: var(--muted);
      background: var(--paper-2); border-radius: 999px; padding: 3px 10px;
      font-variant-numeric: tabular-nums;
    }
    .acc-chev { margin-left: 0; }
    .tile-accordion[open] .acc-chev { transform: rotate(90deg); color: var(--accent, var(--terracotta)); }

    /* one folder per line, indented so they read as children of the tile */
    .sublinks { border-top: 1px solid var(--line); padding: 6px 6px 6px 14px; display: grid; gap: 2px; }
    .sublinks > .sublink, .sublinks > .subfolder { margin-left: 12px; }
    .sublinks > .sublink-lead { margin-left: 0; }
    .sublink {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 10px; text-decoration: none; color: var(--ink); font-size: 14px;
    }
    .sublink:hover { background: var(--paper-2); }
    .sublink:focus-visible { outline: none; box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent, var(--terracotta)) 45%, transparent); }
    .sublink-tick { flex: none; width: 6px; height: 6px; border-radius: 50%; background: var(--accent, var(--terracotta)); }
    .sublink-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sublink-arrow { margin-left: auto; color: var(--faint); opacity: 0; transition: opacity .14s; }
    .sublink:hover .sublink-arrow { opacity: 1; }
    /* ---- nested drill-down (a folder that holds subfolders) ------- */
    .subfolder { grid-column: 1 / -1; }
    .sublink-parent { cursor: pointer; list-style: none; }
    .sublink-parent::-webkit-details-marker { display: none; }
    .subfolder-count {
      margin-left: auto; flex: none; font-size: 11.5px; color: var(--faint);
      background: var(--paper-2); border-radius: 999px; padding: 1px 8px;
    }
    .subfolder-chev { flex: none; margin-left: 8px; color: var(--faint); transition: transform .16s; }
    .subfolder[open] > .sublink-parent { color: var(--accent, var(--terracotta)); }
    .subfolder[open] > .sublink-parent .subfolder-chev { transform: rotate(90deg); color: var(--accent, var(--terracotta)); }
    .subsublinks {
      display: grid; gap: 2px;
      margin: 2px 0 6px 9px; padding: 2px 0 2px 12px;
      border-left: 2px solid var(--line);
    }
    @media (min-width: 560px) { .subsublinks { grid-template-columns: 1fr 1fr; } }
    .subsublink { font-size: 13.5px; }
    .subsublink .sublink-tick { width: 5px; height: 5px; opacity: .55; }
    .subsublink-open { color: var(--faint); }
    .subsublink-open .sublink-name { font-style: italic; }
    /* pinned "open whole drive" row at the top */
    .sublink-lead { grid-column: 1 / -1; color: var(--faint); border-bottom: 1px solid var(--line); border-radius: 0; margin-bottom: 4px; }
    .sublink-lead .sublink-tick { display: none; }
    .sublink-lead .sublink-name { font-style: italic; }
    .sublink-lead .sublink-arrow { opacity: .8; }
    /* a row (or subfolder) set off by a separator line above it */
    .sublink-divider, .subfolder.has-divider { grid-column: 1 / -1; border-top: 1px solid var(--line); margin-top: 4px; padding-top: 12px; }
    .subfolder.has-divider { padding-top: 0; }
    .subfolder.has-divider > .sublink-parent { margin-top: 6px; }
    .acc-note { margin: 0; padding: 4px 16px 16px; color: var(--faint); font-size: 13.5px; }

    .empty {
      color: var(--faint); font-size: 14px; padding: 24px;
      display: none; text-align: center;
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius-lg); margin-top: 16px;
    }

    /* ---- footer ---------------------------------------------------- */
    footer {
      margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--line);
      color: var(--muted); font-size: 13px; text-align: center;
    }
    footer b { color: var(--ink); font-weight: 650; }
    .install {
      display: none; align-items: center; gap: 10px; margin-top: 14px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 12px 14px; box-shadow: var(--shadow);
    }
    .install button {
      font: inherit; font-weight: 600; font-size: 14px; cursor: pointer;
      color: var(--card); background: var(--terracotta); border: 0;
      border-radius: 9px; padding: 8px 14px;
    }
    .install span { color: var(--muted); font-size: 13px; }

    /* ---- announcement banner -------------------------------------- */
    .announce {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0 0; padding: 12px 15px;
      background: color-mix(in srgb, var(--terracotta) 8%, var(--card));
      border: 1px solid color-mix(in srgb, var(--terracotta) 28%, var(--line));
      border-left: 3px solid var(--terracotta);
      border-radius: var(--radius); box-shadow: var(--shadow);
      font-size: 14px; color: var(--ink);
    }
    .announce-dot { flex: none; width: 8px; height: 8px; border-radius: 50%; background: var(--terracotta); }
    .announce-body { min-width: 0; }
    a.announce-body { color: inherit; text-decoration: none; }
    a.announce-body:hover .announce-text { text-decoration: underline; }
    .announce-more { color: var(--terracotta); font-weight: 600; margin-left: 6px; white-space: nowrap; }
    .announce-x {
      margin-left: auto; flex: none; display: grid; place-items: center;
      width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
      background: transparent; border: 0; color: var(--faint); font-size: 18px; line-height: 1;
    }
    .announce-x:hover { background: var(--paper-2); color: var(--ink); }
    .announce-x:focus-visible { outline: none; box-shadow: 0 0 0 2px color-mix(in srgb, var(--terracotta) 40%, transparent); }

    /* ---- "coming soon" state (a link that isn't live yet) --------- */
    .quick.is-soon, .tile.is-soon, .doc-row.is-soon {
      cursor: default; opacity: .62;
      background: var(--paper-2); box-shadow: none;
    }
    .quick.is-soon:hover, .tile.is-soon:hover, .doc-row.is-soon:hover { transform: none; border-color: var(--line); }
    .soon-tag {
      margin-left: 8px; flex: none; font-size: 10.5px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: var(--faint);
      border: 1px solid var(--line); border-radius: 999px; padding: 2px 7px;
      background: var(--card);
    }
    .tile .soon-tag { margin-left: auto; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
  <script>
    /* Set the saved theme before first paint so there's no flash. */
    try { var t = localStorage.getItem("tu-theme"); if (t) document.documentElement.dataset.theme = t; } catch (e) {}
  </script>
</head>
<body>
  <div class="wrap">
    <div id="announce"></div>
    <header>
      <div class="head-main">
        <p class="eyebrow">MLRI · Training Unit</p>
        <h1>Command Center</h1>
      </div>
      <div class="head-right">
        <div class="head-meta">
          <div class="greeting" id="greeting"></div>
          <div class="today" id="today"></div>
        </div>
        <div class="top-actions">
          <div class="search-wrap">
            <button class="icon-btn" id="searchToggle" type="button" aria-label="Search tools" aria-expanded="false" aria-controls="searchPanel">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            </button>
            <div class="search-panel" id="searchPanel">
              <input id="q" type="search" placeholder="Search tools…" autocomplete="off" aria-label="Filter tools" />
            </div>
          </div>
          <button class="icon-btn" id="themeToggle" type="button" aria-label="Switch color theme"></button>
        </div>
      </div>
    </header>

    <div id="board"></div>
    <p class="empty" id="empty">No tool matches that. Try a different word.</p>

    <div class="install" id="install">
      <span>Add this to your home screen or taskbar for one-tap access.</span>
      <button id="installBtn">Install</button>
    </div>

    <footer>
      Something missing or broken?
      Ping Marlie and it gets added.
    </footer>
  </div>

  <script>
    /* ================================================================
       EDIT HERE — this is the only part you need to touch.

       ── Post a team notice ──────────────────────────────────────────
       Edit ANNOUNCEMENT below. Set `text` to your message; leave it ""
       to hide the banner. Whenever you change the message, also bump
       `id` to something new (e.g. today's date) — that re-shows it to
       everyone who dismissed the last one. `url` is optional (a link the

    function monoHtml(item) {
      return item.icon
        ? '<span class="mono mono--logo" aria-hidden="true"><img src="' + item.icon + '" alt=""></span>'
        : '<span class="mono" aria-hidden="true">' + (item.mono || "") + '</span>';
    }

    function searchKey(item, sec, extra) {
      const desc = item.desc || item.who || "";
      return (item.name + " " + desc + " " + (item.keywords || "") + " " + (extra || "") + " " + sec).toLowerCase();
    }

    function renderAccordion(item, sec, grid) {
      const d = document.createElement("details");
      d.className = "tile-accordion";
      d.style.setProperty("--accent", item.accent);
      if (item.group) d.setAttribute("name", item.group);
      if (item.open) { d.open = true; d.dataset.default = "open"; }
      const childText = item.children
        .flatMap(c => [c.name, ...(c.children ? c.children.map(g => g.name) : [])])
        .join(" ");
      d.dataset.search = searchKey(item, sec, childText);

      const sum = document.createElement("summary");
      sum.className = "acc-summary";
      sum.innerHTML =
        monoHtml(item) +
        '<span class="tile-body">' +
          '<div class="tile-name"></div>' +
          '<div class="tile-desc"></div>' +
        '</span>' +
        '<span class="acc-count"></span>' +
        '<span class="tile-arrow acc-chev" aria-hidden="true">→</span>';
      sum.querySelector(".tile-name").textContent = item.name;
      sum.querySelector(".tile-desc").textContent = item.desc;
      if (item.count) sum.querySelector(".acc-count").textContent = item.count;
      d.appendChild(sum);

      const box = document.createElement("div");
      box.className = "sublinks";

      // One plain link row (a leaf folder, or the "Open whole folder" shortcut).
      const makeLeaf = (name, url, cls, extra) => {
        const a = document.createElement("a");
        a.className = cls;
        a.href = url;
        if (url && url !== "#") { a.target = "_blank"; a.rel = "noopener"; }
        a.dataset.search = (name + " " + (extra || "") + " " + item.name).toLowerCase();
        a.innerHTML =
          '<span class="sublink-tick" aria-hidden="true"></span>' +
          '<span class="sublink-name"></span>' +
          '<span class="sublink-arrow" aria-hidden="true">↗</span>';
        a.querySelector(".sublink-name").textContent = name;
        return a;
      };

      for (const c of item.children) {
        if (c.children && c.children.length) {
          // A folder that contains subfolders → a nested drill-down.
          const sf = document.createElement("details");
          sf.className = "subfolder" + (c.divider ? " has-divider" : "");
          if (c.color) sf.style.setProperty("--accent", c.color);  // dot + subfolders inherit it
          sf.dataset.search =
            (c.name + " " + c.children.map(g => g.name).join(" ") + " " + item.name).toLowerCase();

          const ss = document.createElement("summary");
          ss.className = "sublink sublink-parent";
          ss.innerHTML =
            '<span class="sublink-tick" aria-hidden="true"></span>' +
            '<span class="sublink-name"></span>' +
            '<span class="subfolder-count"></span>' +
            '<span class="subfolder-chev" aria-hidden="true">›</span>';
          ss.querySelector(".sublink-name").textContent = c.name;
          ss.querySelector(".subfolder-count").textContent = c.children.length;
          sf.appendChild(ss);

          const inner = document.createElement("div");
          inner.className = "subsublinks";
          if (c.url && c.url !== "#") {
            inner.appendChild(makeLeaf(item.openLabel || "Open whole folder", c.url, "sublink subsublink subsublink-open", c.name));
          }
          for (const g of c.children) inner.appendChild(makeLeaf(g.name, g.url, "sublink subsublink", c.name));
          sf.appendChild(inner);
          box.appendChild(sf);
        } else {
          let cls = "sublink";
          if (c.lead) cls += " sublink-lead";
          if (c.divider) cls += " sublink-divider";
          const leaf = makeLeaf(c.name, c.url, cls);
          if (c.color) leaf.style.setProperty("--accent", c.color);
          box.appendChild(leaf);
        }
      }
      d.appendChild(box);
      grid.appendChild(d);
    }

    function renderTile(item, sec, grid) {
      const soon = item.soon || !item.url || item.url === "#";
      const el = document.createElement(soon ? "span" : "a");
      el.className = soon ? "tile is-soon" : "tile";
      if (soon) { el.setAttribute("aria-disabled", "true"); }
      else { el.href = item.url; el.target = "_blank"; el.rel = "noopener"; }

      el.querySelector(".tile-desc").textContent = item.desc;
      grid.appendChild(el);
    }

    const board = document.getElementById("board");

    for (const sec of order) {

      s.dataset.section = sec;

      const head = document.createElement("div");

      label.textContent = sec;
      head.appendChild(label);

      if (cfg.layout === "docs") {
        const list = document.createElement("div");
        list.className = "doc-list";
        for (const item of items) renderDocRow(item, sec, list);
        body.appendChild(list);
      } else if (cfg.layout === "apps") {
        const grid = document.createElement("div");
        grid.className = "app-grid";
        for (const item of items) renderAppTile(item, sec, grid);
        body.appendChild(grid);
      } else {
        const grid = document.createElement("div");
        grid.className = "grid grid--tools";
        for (const item of items) {
          if (item.children) renderAccordion(item, sec, grid);
          else renderTile(item, sec, grid);
        }
        body.appendChild(grid);
      }

      s.appendChild(body);
      (LEFT_SECTIONS.has(sec) ? leftCol : rightCol).appendChild(s);
    }

    /* ---- announcement --------------------------------------------- */
    /* Shows the banner unless its `id` was already dismissed on this device.
       Bumping ANNOUNCEMENT.id re-shows it to everyone. */
    (function renderAnnouncement() {
      const a = ANNOUNCEMENT;
      if (!a || !a.text || !a.text.trim()) return;
      let dismissed = "";
      try { dismissed = localStorage.getItem("tu-announce") || ""; } catch (e) {}
      if (a.id && dismissed === a.id) return;

      const el = document.createElement("div");
      el.className = "announce";
      el.setAttribute("role", "status");

      const dot = document.createElement("span");
      dot.className = "announce-dot"; dot.setAttribute("aria-hidden", "true");

      const body = document.createElement(a.url ? "a" : "span");
      body.className = "announce-body";
      if (a.url) { body.href = a.url; body.target = "_blank"; body.rel = "noopener"; }
      body.innerHTML = '<span class="announce-text"></span>' +
        (a.url ? '<span class="announce-more">Open →</span>' : '');
      body.querySelector(".announce-text").textContent = a.text;

      const x = document.createElement("button");
      x.className = "announce-x"; x.type = "button";
      x.setAttribute("aria-label", "Dismiss announcement");
      x.innerHTML = "&times;";
      x.addEventListener("click", () => {
        el.remove();
        try { if (a.id) localStorage.setItem("tu-announce", a.id); } catch (e) {}
      });

      el.append(dot, body, x);
      document.getElementById("announce").appendChild(el);
    })();

    /* ---- filter ---------------------------------------------------- */
    const q = document.getElementById("q");
    const empty = document.getElementById("empty");
    const searchToggle = document.getElementById("searchToggle");
    const searchPanel = document.getElementById("searchPanel");

    function setSearchOpen(open) {
      searchPanel.classList.toggle("is-open", open);
      searchToggle.setAttribute("aria-expanded", open ? "true" : "false");
      if (open) q.focus();
      else q.blur();
    }

    function applyFilter() {
      const term = q.value.trim().toLowerCase();
      board.classList.toggle("is-searching", !!term);
      let anyVisible = false;
      for (const sec of board.querySelectorAll(".dash-panel")) {
        let secVisible = false;
        for (const el of sec.querySelectorAll("[data-search]")) {
          const match = !term || el.dataset.search.includes(term);
          el.style.display = match ? "" : "none";
          if (match) { secVisible = true; anyVisible = true; }
          if (el.classList.contains("tile-accordion")) {
            el.open = term ? match : el.dataset.default === "open";
          }
          if (el.classList.contains("subfolder")) {
            el.open = term ? match : false;
          }
        }
        sec.style.display = secVisible ? "" : "none";
      }
      empty.style.display = anyVisible ? "none" : "block";
      searchToggle.classList.toggle("is-active", !!term);
    }
    q.addEventListener("input", applyFilter);

    searchToggle.addEventListener("click", () => {
      setSearchOpen(!searchPanel.classList.contains("is-open"));
    });

    document.addEventListener("click", (e) => {
      if (searchPanel.classList.contains("is-open") && !e.target.closest(".search-wrap")) {
        setSearchOpen(false);
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "/" && document.activeElement !== q) { e.preventDefault(); setSearchOpen(true); }
      if (e.key === "Escape" && (document.activeElement === q || searchPanel.classList.contains("is-open"))) {
        q.value = ""; applyFilter(); setSearchOpen(false);
      }
    });

    /* ---- install prompt ------------------------------------------- */
    let deferred;
    const installBox = document.getElementById("install");
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault(); deferred = e; installBox.style.display = "flex";
    });
    document.getElementById("installBtn").addEventListener("click", async () => {
      if (!deferred) return;
      deferred.prompt(); await deferred.userChoice; deferred = null; installBox.style.display = "none";
    });

    /* ---- theme toggle --------------------------------------------- */
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const themeMeta = document.querySelector('meta[name="theme-color"]');
    const SUN  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
    const MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
    const isDark = () => (root.dataset.theme ? root.dataset.theme === "dark" : prefersDark.matches);

    function paintTheme() {
      const dark = isDark();
      toggle.innerHTML = dark ? SUN : MOON;                 // show where the click takes you
      toggle.setAttribute("aria-label", dark ? "Switch to light mode" : "Switch to dark mode");
      if (themeMeta) themeMeta.content = dark ? "#17150f" : "#f7f3ec";
    }
    toggle.addEventListener("click", () => {
      const next = isDark() ? "light" : "dark";
      root.dataset.theme = next;
      try { localStorage.setItem("tu-theme", next); } catch (e) {}
      paintTheme();
    });
    prefersDark.addEventListener("change", () => { if (!root.dataset.theme) paintTheme(); });
    paintTheme();

    /* ---- greeting + date ------------------------------------------ */
    (function () {
      const now = new Date();
      const h = now.getHours();
      const greet = h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";
      const g = document.getElementById("greeting");
      const t = document.getElementById("today");
      if (g) g.textContent = greet + ".";
      if (t) t.textContent = now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
    })();

    /* ---- service worker ------------------------------------------- */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
