<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Training Unit — Command Center</title>
  <meta name="description" content="One place for every tool the MLRI Training Unit uses." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://trainingunit.pages.dev/" />
  <meta property="og:title" content="Training Unit — Command Center" />
  <meta property="og:description" content="One place for every tool the MLRI Training Unit uses." />
  <meta property="og:image" content="https://trainingunit.pages.dev/icons/app/icon.svg" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Training Unit — Command Center" />
  <meta name="twitter:description" content="One place for every tool the MLRI Training Unit uses." />
  <meta name="twitter:image" content="https://trainingunit.pages.dev/icons/app/icon.svg" />
  <meta name="theme-color" content="#f7f3ec" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48 64x64 128x128 256x256" />
  <link rel="icon" href="icons/app/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="icons/app/icon-32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="icons/app/icon-48.png" type="image/png" sizes="48x48" />
  <link rel="apple-touch-icon" href="icons/app/icon-180.png" />

  <style>
    /* ---- tokens ---------------------------------------------------- */
    :root {
      --paper:      #f7f3ec;
      --paper-2:    #f1ebdf;
      --card:       #ffffff;
      --line:       #e7e0d3;
      --ink:        #1c1a17;
      --muted:      #6b6459;
      --faint:      #6f675c;
      --terracotta: #b4531f;
      --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
      --sans:  ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow: 0 1px 2px rgba(28,26,23,.04), 0 6px 20px -6px rgba(28,26,23,.10);
      --shadow-lg: 0 2px 4px rgba(28,26,23,.05), 0 14px 36px -10px rgba(28,26,23,.14);
    }

    /* Dark tokens, defined once. Applied when the OS is dark (unless the user
       forced light), or whenever the user explicitly picks dark via the toggle. */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --paper: #0e1119; --paper-2: #171d29; --card: #1b222f; --line: #303a4c;
        --ink: #eef2f9; --muted: #9aa8bc; --faint: #6d7d92; --terracotta: #e6873f;
        --shadow: 0 1px 2px rgba(0,0,0,.35), 0 8px 24px -8px rgba(0,0,0,.5);
      }
    }
    :root[data-theme="dark"] {
      --paper: #0e1119; --paper-2: #171d29; --card: #1b222f; --line: #303a4c;
      --ink: #eef2f9; --muted: #9aa8bc; --faint: #6d7d92; --terracotta: #e6873f;
      --shadow: 0 1px 2px rgba(0,0,0,.35), 0 8px 24px -8px rgba(0,0,0,.5);
    }

    /* top-right actions (search + theme) */
    .head-right {
      display: flex; align-items: center; gap: 12px;
    }
    .top-actions {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .icon-btn {
      width: 44px; height: 44px; display: grid; place-items: center;
      background: var(--card); border: 1px solid var(--line); border-radius: 999px;
      color: var(--ink); cursor: pointer; box-shadow: var(--shadow);
      transition: transform .17s ease, border-color .17s ease, background .17s ease;
    }
    .icon-btn:hover { transform: translateY(-1px); border-color: color-mix(in srgb, var(--terracotta) 45%, var(--line)); }
    .icon-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px color-mix(in srgb, var(--terracotta) 35%, transparent), var(--shadow); }
    .icon-btn svg { width: 20px; height: 20px; }
    .icon-btn[aria-expanded="true"],
    .icon-btn.is-active {
      border-color: var(--terracotta);
      color: var(--terracotta);
    }

    .search-wrap { position: relative; z-index: 5; }
    .search-panel {
      position: absolute; top: calc(100% + 8px); right: 0;
      width: min(320px, calc(100vw - 32px));
      opacity: 0; visibility: hidden; pointer-events: none;
      transform: translateY(-6px);
      transition: opacity .16s ease, transform .16s ease, visibility .16s;
    }
    .search-panel.is-open {
      opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0);
    }
    .search-panel input {
      width: 100%; font: inherit; font-size: 15px; color: var(--ink);
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 11px 14px;
      box-shadow: var(--shadow); transition: border-color .15s;
    }
    .search-panel input::placeholder { color: var(--faint); }
    .search-panel input:focus { outline: none; border-color: var(--terracotta); }
    .search-field { position: relative; }
    .search-field input { padding-right: 38px; }
    .search-clear {
      position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
      display: none; align-items: center; justify-content: center;
      width: 24px; height: 24px; padding: 0; border: 0; border-radius: 999px;
      background: transparent; color: var(--faint); cursor: pointer; font-size: 18px;
      line-height: 1; transition: color .14s ease, background .14s ease;
    }
    .search-clear:hover, .search-clear:focus-visible {
      outline: none; color: var(--ink);
      background: color-mix(in srgb, var(--terracotta) 14%, transparent);
    }
    .search-field.has-text .search-clear { display: inline-flex; }
    .search-count {
      margin: 0 2px; font-size: 12.5px; color: var(--faint);
    }
    .search-count:not(:empty) { margin-top: 7px; }
    mark.hl {
      background: color-mix(in srgb, var(--terracotta) 26%, transparent);
      color: inherit; border-radius: 3px; padding: 0 1px;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    html, body { overflow-x: hidden; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, color-mix(in srgb, var(--terracotta) 8%, transparent), transparent),
        var(--paper);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding: max(20px, env(safe-area-inset-top)) 24px calc(40px + env(safe-area-inset-bottom));
    }
    .wrap { max-width: 1160px; margin: 0 auto; }

    /* ---- accessibility --------------------------------------------- */
    .skip-link {
      position: absolute; left: 16px; top: -100%;
      z-index: 100; padding: 10px 14px; border-radius: var(--radius);
      background: var(--card); color: var(--ink); font-weight: 650;
      border: 1px solid var(--line); box-shadow: var(--shadow);
      text-decoration: none;
    }
    .skip-link:focus {
      position: fixed; top: max(16px, env(safe-area-inset-top)); left: 16px;
      outline: none;
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    /* ---- header ---------------------------------------------------- */
    header.hero-band {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 16px 32px;
      padding: 20px 22px;
      margin-bottom: 16px;
      background: var(--paper-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .head-main { min-width: 0; }
    .tick {
      width: 4px; height: 12px; border-radius: 2px;
      background: var(--terracotta); flex-shrink: 0;
    }
    .eyebrow {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--terracotta); font-weight: 650; margin: 0 0 8px;
    }
    h1 {
      font-family: var(--serif); font-weight: 700;
      font-size: clamp(28px, 5vw, 40px); line-height: 1.05;
      letter-spacing: 0; margin: 0;
    }
    .head-meta {
      text-align: right;
      min-height: 44px;
      display: flex; flex-direction: column; justify-content: center;
      padding: 8px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .greeting { font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.2; }
    .today { font-size: 13px; color: var(--muted); margin-top: 2px; }
    @media (max-width: 640px) {
      body {
        padding: max(12px, env(safe-area-inset-top)) 12px calc(28px + env(safe-area-inset-bottom));
      }
      header.hero-band {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .head-right {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: stretch;
        gap: 10px;
        width: 100%;
      }
      .head-meta {
        min-height: 44px;
        min-width: 0;
        text-align: left;
        padding: 8px 12px;
        border-radius: var(--radius);
      }
      .top-actions { gap: 6px; }
      .icon-btn {
        width: 42px;
        height: 42px;
        box-shadow: none;
      }
      .search-wrap { position: static; }
      .search-panel {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        width: auto;
        z-index: 50;
      }
      h1 { font-size: clamp(30px, 12vw, 40px); }
    }

    /* ---- dashboard grid -------------------------------------------- */
    #board { margin-top: 0; }

    @media (min-width: 960px) {
      #board {
        display: grid;
        grid-template-columns: minmax(0, 62fr) minmax(300px, 38fr);
        gap: 16px;
        align-items: start;
      }
      .dash-col {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-width: 0;
      }

      #board.is-searching {
        display: block;
      }
      #board.is-searching .dash-col {
        display: block;
      }
      #board.is-searching .dash-col + .dash-col {
        margin-top: 0;
      }
      #board.is-searching .dash-panel + .dash-panel {
        margin-top: 16px;
      }
      #board.is-searching .dash-col:first-child .dash-panel:first-child {
        margin-top: 0;
      }
    }

    @media (max-width: 959px) {
      #board {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .dash-col {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
    }

    .dash-panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px 18px 16px;
    }
    .dash-panel--work { padding: 20px; }

    .panel-head {
      margin: 0 0 14px; padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .panel-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 650; letter-spacing: .04em;
      text-transform: uppercase; color: var(--muted); margin: 0;
    }
    .panel-title::before {
      content: ""; flex-shrink: 0;
      width: 4px; height: 12px; border-radius: 2px;
      background: var(--terracotta);
    }


    /* ---- layouts --------------------------------------------------- */
    .grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
    .grid--tools { gap: 12px; }

    .doc-list {
      list-style: none; margin: 0; padding: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .doc-list > li { min-width: 0; }
    .doc-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 12px; border-radius: var(--radius);
      text-decoration: none; color: inherit;
      border: 1px solid transparent;
      transition: background .17s ease, border-color .17s ease, transform .17s ease;
    }
    .doc-row:hover {
      background: var(--paper-2);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 30%, var(--line));
      transform: translateX(2px);
    }
    .doc-row:focus-visible {
      background: var(--paper-2);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 30%, var(--line));
      outline: none;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--terracotta)) 35%, transparent);
    }
    .doc-row .tile-body { flex: 1; min-width: 0; }
    .doc-row .tile-name { font-size: 15px; font-weight: 600; }
    .doc-row .tile-desc { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-row .tile-arrow { margin-left: 0; font-size: 15px; opacity: .75; color: var(--muted); }
    .doc-row:hover .tile-arrow, .doc-row:focus-visible .tile-arrow { opacity: 1; color: var(--accent, var(--terracotta)); }
    .doc-divider-item { list-style: none; }
    .doc-divider {
      border: 0; border-top: 1px solid var(--line);
      margin: 4px 0; height: 0;
    }

    /* LMS rows get a subtle resting surface so they read as clickable
       as the larger Planning & Collaboration tiles, laid out 2×2. */
    .dash-panel[data-section="LMS"] .doc-list {
      display: grid; gap: 8px; grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 520px) {
      .dash-panel[data-section="LMS"] .doc-list { grid-template-columns: 1fr; }
    }
    .dash-panel[data-section="LMS"] .doc-list > li:not(.doc-divider-item) { display: contents; }
    .dash-panel[data-section="LMS"] .doc-divider-item { grid-column: 1 / -1; }
    .dash-panel[data-section="LMS"] .doc-row {
      background: var(--paper-2);
      border-color: var(--line);
    }
    .dash-panel[data-section="LMS"] .doc-row:hover,
    .dash-panel[data-section="LMS"] .doc-row:focus-visible {
      background: var(--card);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 45%, var(--line));
    }

    .app-grid {
      list-style: none; margin: 0; padding: 0;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .app-grid > li { min-width: 0; display: flex; }
    .app-grid .app-tile { flex: 1; width: 100%; }
    @media (max-width: 400px) { .app-grid { grid-template-columns: repeat(2, 1fr); } }
    .app-tile {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 16px 10px; border-radius: var(--radius);
      text-decoration: none; color: inherit; text-align: center;
      background: var(--paper-2); border: 1px solid var(--line);
      transition: transform .17s ease, border-color .17s ease, background .17s ease;
    }
    .app-tile:hover {
      transform: translateY(-1px);
      background: var(--card);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 45%, var(--line));
    }
    .app-tile:focus-visible {
      outline: none;
      background: var(--card);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 45%, var(--line));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--terracotta)) 35%, transparent);
    }
    .app-label {
      font-size: 14px; font-weight: 650; line-height: 1.3;
      letter-spacing: 0; color: var(--ink);
      width: 100%; text-align: center;
    }
    .app-tile.is-soon { opacity: .55; cursor: default; }
    .app-tile.is-soon:hover { transform: none; border-color: var(--line); }
    .app-tile .soon-tag {
      margin: 0; font-size: 9px; padding: 1px 5px;
    }

    @media (max-width: 640px) {
      .dash-panel {
        padding: 14px 12px 12px;
        border-radius: var(--radius);
      }
      .dash-panel--work { padding: 14px 12px 12px; }
      .panel-head {
        margin-bottom: 10px;
        padding-bottom: 10px;
      }
      .tile,
      .acc-summary,
      .doc-row {
        gap: 10px;
        padding: 12px;
      }
      .tile,
      .doc-row,
      .acc-summary,
      .sublink {
        min-height: 48px;
      }
      .mono {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        font-size: 16px;
      }
      .tile-name { font-size: 15.5px; }
      .tile-desc,
      .doc-row .tile-desc {
        white-space: normal;
        overflow: visible;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .tile-arrow {
        align-self: center;
        transform: none !important;
      }
      .acc-count,
      .subfolder-count {
        font-size: 12px;
        padding-inline: 7px;
      }
      .sublinks {
        padding: 6px;
      }
      .sublinks > li { margin-left: 0; }
      .sublink {
        gap: 8px;
        padding: 10px;
      }
      .sublink-arrow { opacity: .75; }
      .subsublinks {
        margin-left: 7px;
        padding-left: 9px;
      }
      .app-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }
      .app-tile {
        min-height: 94px;
        padding: 12px 6px;
        gap: 8px;
      }
      .app-label {
        font-size: 13px;
        overflow-wrap: anywhere;
      }
      .announce {
        align-items: flex-start;
        margin-top: 12px;
        padding: 11px 12px;
      }
      footer {
        margin-top: 24px;
        padding-top: 16px;
      }
    }

    @media (max-width: 400px) {
      .head-right {
        grid-template-columns: 1fr;
      }
      .top-actions {
        justify-content: flex-end;
      }
      .app-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .acc-count,
      .subfolder-count {
        display: none;
      }
    }

    @media (hover: none) {
      .icon-btn:hover,
      .doc-row:hover,
      .app-tile:hover,
      .quick:hover,
      .tile:hover {
        transform: none;
      }
    }

    /* legacy quick styles (search results fallback) */
    .quick-links { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-links--block { margin-left: 0; margin-top: 2px; gap: 10px; }
    .quick {
      display: inline-flex; align-items: center; gap: 7px; text-decoration: none;
      color: var(--ink); background: var(--paper-2); border: 1px solid var(--line);
      border-radius: 999px; padding: 6px 13px 6px 9px; font-size: 14px; font-weight: 600;
      transition: transform .14s ease, border-color .14s ease;
    }
    .quick:hover, .quick:focus-visible {
      transform: translateY(-1px); outline: none;
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 55%, var(--line));
    }
    .quick img { width: 17px; height: 17px; display: block; }
    .quick-mono {
      width: 17px; height: 17px; display: grid; place-items: center; border-radius: 5px;
      font-family: var(--serif); font-weight: 700; font-size: 12px;
      color: var(--accent, var(--terracotta));
      background: color-mix(in srgb, var(--accent, var(--terracotta)) 14%, var(--card));
    }

    /* ---- tile ------------------------------------------------------ */
    .tile {
      display: flex; align-items: center; gap: 14px; text-decoration: none;
      color: inherit; background: var(--paper-2); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 14px 16px;
      transition: transform .17s ease, border-color .17s ease, background .17s ease, box-shadow .17s ease;
    }
    .tile:hover {
      transform: translateY(-2px);
      background: var(--card);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 55%, var(--line));
    }
    .tile:focus-visible {
      transform: translateY(-2px);
      background: var(--card);
      border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 55%, var(--line));
      outline: none;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, var(--terracotta)) 35%, transparent), var(--shadow);
    }
    /* ---- shared application-icon chip (all app logos + letter tiles) ---- */
    .mono {
      flex: none; width: 40px; height: 40px; border-radius: 10px;
      display: grid; place-items: center; font-family: var(--serif);
      font-weight: 700; font-size: 18px;
      color: var(--accent, var(--terracotta));
      background: color-mix(in srgb, var(--accent, var(--terracotta)) 12%, var(--card));
    }
    .mono--logo { background: var(--paper-2); }
    .mono--logo img { width: 24px; height: 24px; display: block; object-fit: contain; }
    /* Learning Hub's logo reads heavier than the Brightspace marks; trim it back. */
    .mono--logo img[src*="learning-hub"] { width: 22px; height: 22px; }
    /* Brightspace (D2L) mark has extra padding in the PNG — scale up to match neighbors. */
    .mono--logo img[src*="brightspace.png"] { width: 28px; height: 28px; }
    /* D2L Academy mark is a circle with extra padding — scale up to match neighbors. */
    .mono--logo img[src*="D2L-Symbol"] { width: 32px; height: 32px; }
    .mono--icon svg {
      width: 20px; height: 20px; display: block;
      stroke: currentColor; fill: none;
    }
    .tile-body { min-width: 0; }
    .tile-name { font-weight: 650; font-size: 16.5px; letter-spacing: 0; }
    .tile-desc {
      color: var(--muted); font-size: 14px; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tile-arrow { margin-left: auto; color: var(--muted); flex: none; transition: transform .17s, color .17s; }
    .tile:hover .tile-arrow, .tile:focus-visible .tile-arrow { color: var(--accent, var(--terracotta)); transform: translateX(3px); }

    /* ---- accordion tile (Drive, Monday) --------------------------- */
    .tile-accordion {
      grid-column: 1 / -1;
      background: var(--paper-2); border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden; transition: border-color .14s ease;
    }
    .tile-accordion:hover,
    .tile-accordion[open] { border-color: color-mix(in srgb, var(--accent, var(--terracotta)) 45%, var(--line)); }
    .acc-summary {
      list-style: none; cursor: pointer;
      display: flex; align-items: center; gap: 14px; padding: 15px 16px;
    }

      "list-checks": '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>',
      "users": '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      "map": '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/></svg>',
    };

    function monoHtml(item) {
      if (item.icon) {
        return '<span class="mono mono--logo" aria-hidden="true"><img src="' + item.icon + '" alt=""></span>';
      }
      if (item.lucide && LUCIDE[item.lucide]) {
        return '<span class="mono mono--icon" aria-hidden="true">' + LUCIDE[item.lucide] + '</span>';
      }
      return '<span class="mono" aria-hidden="true">' + (item.mono || "") + '</span>';
    }

    function searchKey(item, sec, extra) {
      const desc = item.desc || item.who || "";
      return (item.name + " " + desc + " " + (item.keywords || "") + " " + (extra || "") + " " + sec).toLowerCase();
    }

    function renderAccordion(item, sec, grid) {
      const d = document.createElement("details");
      d.className = "tile-accordion";
      d.style.setProperty("--accent", item.accent);
      if (item.group) { d.setAttribute("name", item.group); d.dataset.group = item.group; }
      if (item.open) { d.open = true; d.dataset.default = "open"; }
      const childText = item.children
        .flatMap(c => [c.name, ...(c.children ? c.children.map(g => g.name) : [])])
        .join(" ");
      d.dataset.search = searchKey(item, sec, childText);

      const sum = document.createElement("summary");
      sum.className = "acc-summary";
      sum.innerHTML =
        monoHtml(item) +
        '<span class="tile-body">' +
          '<div class="tile-name"></div>' +
          '<div class="tile-desc"></div>' +
        '</span>' +
        '<span class="acc-count"></span>' +
        '<span class="tile-arrow acc-chev" aria-hidden="true">→</span>';
      sum.querySelector(".tile-name").textContent = item.name;
      sum.querySelector(".tile-desc").textContent = item.desc;
      if (item.count) sum.querySelector(".acc-count").textContent = item.count;
      d.appendChild(sum);

      const box = document.createElement("ul");
      box.className = "sublinks";

      // One plain link row (a leaf folder, or the "Open whole folder" shortcut).
      const makeLeaf = (name, url, cls, extra) => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.className = cls;
        a.href = url;
        if (url && url !== "#") { a.target = "_blank"; a.rel = "noopener noreferrer"; }
        a.dataset.search = (name + " " + (extra || "") + " " + item.name).toLowerCase();
        a.innerHTML =
          '<span class="sublink-tick" aria-hidden="true"></span>' +
          '<span class="sublink-name"></span>' +
          '<span class="sublink-arrow" aria-hidden="true">↗</span>' +
          (url && url !== "#" ? SR_NEW_TAB : "");
        a.querySelector(".sublink-name").textContent = name;
        li.appendChild(a);
        return li;
      };

      for (const c of item.children) {
        if (c.children && c.children.length) {
          // A folder that contains subfolders → a nested drill-down.
          const sf = document.createElement("details");
          sf.className = "subfolder" + (c.divider ? " has-divider" : "");
          if (c.color) sf.style.setProperty("--accent", c.color);  // dot + subfolders inherit it
          sf.dataset.search =
            (c.name + " " + c.children.map(g => g.name).join(" ") + " " + item.name).toLowerCase();

          const ss = document.createElement("summary");
          ss.className = "sublink sublink-parent";
          ss.innerHTML =
            '<span class="sublink-tick" aria-hidden="true"></span>' +
            '<span class="sublink-name"></span>' +
            '<span class="subfolder-count"></span>' +
            '<span class="subfolder-chev" aria-hidden="true">›</span>';
          ss.querySelector(".sublink-name").textContent = c.name;
          ss.querySelector(".subfolder-count").textContent = c.children.length;
          sf.appendChild(ss);

          const inner = document.createElement("ul");
          inner.className = "subsublinks";
          if (c.url && c.url !== "#") {
            inner.appendChild(makeLeaf(item.openLabel || "Open whole folder", c.url, "sublink subsublink subsublink-open", c.name));
          }
          for (const g of c.children) inner.appendChild(makeLeaf(g.name, g.url, "sublink subsublink", c.name));
          sf.appendChild(inner);

          const sfLi = document.createElement("li");
          sfLi.className = "subfolder-item";
          sfLi.appendChild(sf);
          box.appendChild(sfLi);
        } else {
          let cls = "sublink";
          if (c.lead) cls += " sublink-lead";
          if (c.divider) cls += " sublink-divider";
          const leaf = makeLeaf(c.name, c.url, cls);
          if (c.color) leaf.style.setProperty("--accent", c.color);
          box.appendChild(leaf);
        }
      }
      d.appendChild(box);
      grid.appendChild(d);
    }

    function renderTile(item, sec, grid) {
      const soon = item.soon || !item.url || item.url === "#";
      const el = document.createElement(soon ? "span" : "a");
      el.className = soon ? "tile is-soon" : "tile";
      if (soon) {
        el.setAttribute("aria-disabled", "true");
        el.setAttribute("role", "group");
        el.setAttribute("aria-label", item.name + ". " + item.desc + ". Coming soon.");
      } else { el.href = item.url; el.target = "_blank"; el.rel = "noopener noreferrer"; }
      el.style.setProperty("--accent", item.accent);
      el.dataset.search = searchKey(item, sec);
      el.innerHTML =
        monoHtml(item) +
        '<span class="tile-body">' +
          '<div class="tile-name"></div>' +
          '<div class="tile-desc"></div>' +
        '</span>' +
        (soon ? '<span class="soon-tag">soon</span>' + SR_SOON
              : '<span class="tile-arrow" aria-hidden="true">→</span>' + SR_NEW_TAB);
      el.querySelector(".tile-name").textContent = item.name;
      el.querySelector(".tile-desc").textContent = item.desc;
      grid.appendChild(el);
    }

    function renderDocRow(item, sec, list) {
      const soon = item.soon || !item.url || item.url === "#";
      const el = document.createElement(soon ? "span" : "a");
      el.className = soon ? "doc-row is-soon" : "doc-row";
      if (soon) {
        el.setAttribute("aria-disabled", "true");
        el.setAttribute("role", "group");
        el.setAttribute("aria-label", item.name + ". " + item.desc + ". Coming soon.");
      } else { el.href = item.url; el.target = "_blank"; el.rel = "noopener noreferrer"; }
      el.style.setProperty("--accent", item.accent);
      el.dataset.search = searchKey(item, sec);
      el.innerHTML =
        monoHtml(item) +
        '<span class="tile-body">' +
          '<div class="tile-name"></div>' +
          '<div class="tile-desc"></div>' +
        '</span>' +
        (soon ? '<span class="soon-tag">soon</span>' + SR_SOON
              : '<span class="tile-arrow" aria-hidden="true">↗</span>' + SR_NEW_TAB);
      el.querySelector(".tile-name").textContent = item.name;
      el.querySelector(".tile-desc").textContent = item.desc;
      const li = document.createElement("li");
      li.appendChild(el);
      list.appendChild(li);
      if (item.dividerAfter) {
        const divLi = document.createElement("li");
        divLi.className = "doc-divider-item";
        divLi.setAttribute("aria-hidden", "true");
        const hr = document.createElement("hr");
        hr.className = "doc-divider";
        divLi.appendChild(hr);
        list.appendChild(divLi);
      }
    }

    function renderAppTile(item, sec, grid) {
      const soon = item.soon || !item.url || item.url === "#";
      const el = document.createElement(soon ? "span" : "a");
      el.className = soon ? "app-tile is-soon" : "app-tile";
      if (soon) {
        el.setAttribute("aria-disabled", "true");
        el.setAttribute("role", "group");
        el.setAttribute("aria-label", item.name + ". Coming soon.");
      } else { el.href = item.url; el.target = "_blank"; el.rel = "noopener noreferrer"; }
      el.style.setProperty("--accent", item.accent);
      el.dataset.search = searchKey(item, sec);
      el.innerHTML = monoHtml(item) + '<span class="app-label"></span>' +
        (soon ? '<span class="soon-tag">soon</span>' + SR_SOON : SR_NEW_TAB);
      el.querySelector(".app-label").textContent = item.name.replace("Brightspace (D2L)", "Brightspace");
      const li = document.createElement("li");
      li.appendChild(el);
      grid.appendChild(li);
    }

    /* ---- render ---------------------------------------------------- */
    const board = document.getElementById("board");
    const groups = {};
    for (const item of LINKS) (groups[item.section] ||= []).push(item);
    const order = [...SECTION_ORDER, ...Object.keys(groups).filter(s => !SECTION_ORDER.includes(s))];

    const leftCol = document.createElement("div");
    leftCol.className = "dash-col dash-col--main";
    const rightCol = document.createElement("div");
    rightCol.className = "dash-col dash-col--side";

    for (const sec of order) {
      const cfg = SECTION_META[sec] || { layout: "tools" };

      if (!groups[sec]) continue;
      const items = groups[sec];

      const s = document.createElement("section");
      s.className = "dash-panel" + (cfg.layout === "tools" ? " dash-panel--work" : "");
      s.dataset.section = sec;

      const sid = sectionId(sec);
      s.setAttribute("aria-labelledby", sid);

      const head = document.createElement("div");
      head.className = "panel-head";
      const label = document.createElement("h2");
      label.className = "panel-title";
      label.id = sid;
      label.textContent = sec;
      head.appendChild(label);
      s.appendChild(head);

      const body = document.createElement("div");
      body.className = "panel-body";

      if (cfg.layout === "docs") {
        const list = document.createElement("ul");
        list.className = "doc-list";
        for (const item of items) renderDocRow(item, sec, list);
        body.appendChild(list);
      } else if (cfg.layout === "apps") {
        const grid = document.createElement("ul");
        grid.className = "app-grid";
        for (const item of items) renderAppTile(item, sec, grid);
        body.appendChild(grid);
      } else {
        const grid = document.createElement("div");
        grid.className = "grid grid--tools";
        for (const item of items) {
          if (item.children) renderAccordion(item, sec, grid);
          else renderTile(item, sec, grid);
        }
        body.appendChild(grid);
      }

      s.appendChild(body);
      (LEFT_SECTIONS.has(sec) ? leftCol : rightCol).appendChild(s);
    }

    board.append(leftCol, rightCol);

    /* ---- announcement --------------------------------------------- */
    /* Shows the banner unless its `id` was already dismissed on this device.
       Bumping ANNOUNCEMENT.id re-shows it to everyone. */
    (function renderAnnouncement() {
      const a = ANNOUNCEMENT;
      if (!a || !a.text || !a.text.trim()) return;
      let dismissed = "";
      try { dismissed = localStorage.getItem("tu-announce") || ""; } catch (e) {}
      if (a.id && dismissed === a.id) return;

      const el = document.createElement("div");
      el.className = "announce";
      el.setAttribute("role", "region");
      el.setAttribute("aria-label", "Team announcement");

      const dot = document.createElement("span");
      dot.className = "announce-dot"; dot.setAttribute("aria-hidden", "true");

      const body = document.createElement(a.url ? "a" : "span");
      body.className = "announce-body";
      if (a.url) { body.href = a.url; body.target = "_blank"; body.rel = "noopener noreferrer"; }
      body.innerHTML = '<span class="announce-text"></span>' +
        (a.url ? '<span class="announce-more">Open<span class="sr-only"> (opens in new tab)</span> →</span>' : '');
      body.querySelector(".announce-text").textContent = a.text;

      const x = document.createElement("button");
      x.className = "announce-x"; x.type = "button";
      x.setAttribute("aria-label", "Dismiss announcement");
      x.innerHTML = "&times;";
      x.addEventListener("click", () => {
        el.remove();
        try { if (a.id) localStorage.setItem("tu-announce", a.id); } catch (e) {}
      });

      el.append(dot, body, x);
      document.getElementById("announce").appendChild(el);
    })();

    /* ---- filter ---------------------------------------------------- */
    const q = document.getElementById("q");
    const empty = document.getElementById("empty");
    const searchToggle = document.getElementById("searchToggle");
    const searchPanel = document.getElementById("searchPanel");
    const searchField = document.getElementById("searchField");
    const searchClear = document.getElementById("searchClear");
    const searchCount = document.getElementById("searchCount");

    function escapeHtml(s) {
      return s.replace(/[&<>]/g, c => (c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;"));
    }

    // Wrap each matching token in the element's visible text with <mark>.
    // Stores the pristine text in dataset.raw so it can be restored when cleared.
    function highlight(el, tokens) {
      if (el.dataset.raw === undefined) el.dataset.raw = el.textContent;
      const raw = el.dataset.raw;
      if (!tokens.length) {
        if (el.innerHTML !== raw) el.textContent = raw;
        return;
      }
      const escaped = tokens.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).filter(Boolean);
      const re = new RegExp("(" + escaped.join("|") + ")", "gi");
      el.innerHTML = escapeHtml(raw).replace(re, '<mark class="hl">$1</mark>');
    }

    function setSearchOpen(open) {
      searchPanel.classList.toggle("is-open", open);
      searchToggle.setAttribute("aria-expanded", open ? "true" : "false");
      if (open) {
        searchPanel.removeAttribute("inert");
        q.tabIndex = 0;
        q.focus();
      } else {
        searchPanel.setAttribute("inert", "");
        q.tabIndex = -1;
        q.blur();
      }
    }

    function applyFilter() {
      const term = q.value.trim().toLowerCase();
      const tokens = term.split(/\s+/).filter(Boolean);
      const matches = (hay) => tokens.every(t => hay.includes(t));
      board.classList.toggle("is-searching", !!term);
      board.setAttribute("aria-label", term ? "Search results" : "Training Unit tools");
      searchField.classList.toggle("has-text", !!q.value);
      let anyVisible = false;
      let count = 0;
      for (const sec of board.querySelectorAll(".dash-panel")) {
        let secVisible = false;
        for (const el of sec.querySelectorAll("[data-search]")) {
          const match = !term || matches(el.dataset.search);
          el.style.display = match ? "" : "none";
          if (match) {
            secVisible = true; anyVisible = true;
            // Count only top-level tiles/cards, not their nested sublinks.
            if (term && !el.parentElement.closest("[data-search]")) count++;
          }
          if (el.classList.contains("tile-accordion")) {
            // While searching, drop the exclusive <details name> grouping so
            // several matching accordions (e.g. Google + Monday) can stay open
            // at once; restore it when the search clears.
            if (el.dataset.group) {
              if (term) el.removeAttribute("name");
              else el.setAttribute("name", el.dataset.group);
            }
            el.open = term ? match : el.dataset.default === "open";
          }
          if (el.classList.contains("subfolder")) {
            el.open = term ? match : false;
          }
        }
        sec.style.display = secVisible ? "" : "none";
      }
      for (const t of board.querySelectorAll(".tile-name, .sublink-name, .app-label")) highlight(t, tokens);
      empty.style.display = anyVisible ? "none" : "block";
      searchToggle.classList.toggle("is-active", !!term);
      // #searchCount is a polite live region; the #empty message covers the zero case.
      if (!term || !anyVisible) {
        searchCount.textContent = "";
      } else {
        searchCount.textContent = count + (count === 1 ? " tool matches" : " tools match");
      }
    }
    q.addEventListener("input", applyFilter);

    searchClear.addEventListener("click", () => {
      q.value = ""; applyFilter(); q.focus();
    });

    searchToggle.addEventListener("click", () => {
      setSearchOpen(!searchPanel.classList.contains("is-open"));
    });

    document.addEventListener("click", (e) => {
      if (searchPanel.classList.contains("is-open") && !e.target.closest(".search-wrap")) {
        setSearchOpen(false);
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "/" && !e.metaKey && !e.ctrlKey && !e.altKey) {
        const active = document.activeElement;
        if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA" || active.isContentEditable)) return;
        e.preventDefault(); setSearchOpen(true);
      }
      if (e.key === "Escape" && (document.activeElement === q || searchPanel.classList.contains("is-open"))) {
        if (q.value) { q.value = ""; applyFilter(); q.focus(); }  // first Esc clears
        else { setSearchOpen(false); }                           // then closes
      }
    });

    /* ---- theme toggle --------------------------------------------- */
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const themeMeta = document.querySelector('meta[name="theme-color"]');
    const SUN  = '<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
    const MOON = '<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");
    const isDark = () => (root.dataset.theme ? root.dataset.theme === "dark" : prefersDark.matches);

    function paintTheme() {
      const dark = isDark();
      toggle.innerHTML = dark ? SUN : MOON;                 // show where the click takes you
      const themeLabel = dark ? "Switch to light mode" : "Switch to dark mode";
      toggle.setAttribute("aria-label", themeLabel);
      toggle.setAttribute("title", themeLabel);
      if (themeMeta) themeMeta.content = dark ? "#0e1119" : "#f7f3ec";
    }
    toggle.addEventListener("click", () => {
      const next = isDark() ? "light" : "dark";
      root.dataset.theme = next;
      try { localStorage.setItem("tu-theme", next); } catch (e) {}
      paintTheme();
    });
    prefersDark.addEventListener("change", () => { if (!root.dataset.theme) paintTheme(); });
    paintTheme();

    /* ---- greeting + date ------------------------------------------ */
    (function () {
      const now = new Date();
      const h = now.getHours();
      const greet = h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";
      const g = document.getElementById("greeting");
      const t = document.getElementById("today");
      if (g) g.textContent = greet + ".";
      if (t) t.textContent = now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
    })();

    /* ---- service worker ------------------------------------------- */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
